services:

  frontend:
    build: ./frontend
    env_file:
      - ./.env
    networks:
      - net

  # === Infrastructure ===

  nginx:
    build: ./nginx
    env_file:
      - ./.env
    depends_on:
      - frontend
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null ${FRONTEND_URL} || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 120s
      retries: 1

  healthchecker:
    image: alpine:3.23.3
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - net

networks:
  net:
